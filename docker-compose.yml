version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tourism-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: tourism_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./tourism-backend/src/main/resources/db:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build: ./tourism-backend
    container_name: tourism-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tourism_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      JWT_SECRET: tourism-platform-secret-key-2026
    depends_on:
      - mysql

  frontend:
    build: ./tourism-frontend
    container_name: tourism-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
